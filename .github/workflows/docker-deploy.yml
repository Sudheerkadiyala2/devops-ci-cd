name: Docker CI/CD to Amazon Linux EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout the repo
    - name: Checkout Repository
      uses: actions/checkout@v3

    # Step 2: Set up Docker Buildx
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    # Step 3: Log in to Docker Hub
    - name: Docker Login
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Step 4: Build Docker image
    - name: Build Docker image
      run: |
        docker build -t sudheerkadiyala/agency-website:latest .

    # Step 5: Push Docker image to Docker Hub
    - name: Push Docker image
      run: |
        docker push sudheerkadiyala/agency-website:latest

    # Step 6: SSH into Amazon Linux EC2 and deploy
    - name: Deploy to Amazon Linux EC2
      uses: appleboy/ssh-action@v0.1.9
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_KEY }}
        script: |
          # Install Docker if not installed
          if ! command -v docker &> /dev/null
          then
            sudo yum update -y
            sudo amazon-linux-extras install docker -y
            sudo systemctl enable docker
            sudo systemctl start docker
          fi

          # Pull latest image
          docker pull sudheerkadiyala/agency-website:latest

          # Stop and remove old container if exists
          docker stop agency-website || true
          docker rm agency-website || true

          # Run new container
          # Run new container
docker run -d -p 80:80 --name agency-website --restart unless-stopped sudheerkadiyala/agency-website:latest
